---
fit_index: >-
  {{
    1 if (
      hostvars.get(faraday_host | default(''), {}).get('interference_usrp') == 'fit'
      and groups.get('fit_nodes', []) | length > 1
    ) else 0
  }}

fit_node: "{{ groups['fit_nodes'][0] }}"
fit_number: "{{ hostvars[groups['fit_nodes'][0]].fit_number }}"
fit_usrp: "{{ hostvars[groups['fit_nodes'][0]].fit_usrp }}"

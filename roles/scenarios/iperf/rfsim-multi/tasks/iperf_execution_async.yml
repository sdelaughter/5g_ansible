---
# Run Uplink test on UE
- name: Run iperf tests from {{ current_ue.pod }} via faraday
  shell: >
    kubectl exec -n {{ core_ns }} {{ current_ue.pod }} --
    "mkdir -p {{ log_dir }} && iperf3 -p {{ iperf_port }} -B {{ current_ue.ip }} -c {{ target_server }} -t {{ duration }} -J --get-server-output {{ extra_args }} > {{ log_dir }}/iperf.json"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: current_ue.ip is defined and current_ue.ip != ""
  loop: "{{ valid_ue_list }}"
  loop_control:
    loop_var: current_ue
    index_var: ue_index
  async: 120
  poll: 0
  register: iperf_jobs
  vars:
    iperf_port: "{{ 5201 + ue_index }}"
    log_dir: "/tmp/iperf_logs/protocol={{ protocol }}/ue_count={{ valid_ue_list|length }}/direction={{ direction }}"

- name: Wait for async jobs to finish
  async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ iperf_jobs.results }}"
  register: job_results
  until: job_results.finished
  retries: 30
  delay: 2

- name: Cleanup async job files
  async_status:
    jid: "{{ item.ansible_job_id }}"
    mode: cleanup
  loop: "{{ iperf_jobs.results }}"

- pause:
    seconds: "{{ sleep }}"
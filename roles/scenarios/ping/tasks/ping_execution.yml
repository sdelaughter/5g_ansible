---
# Run Uplink test on UE
- name: Run ping tests from {{ current_ue }} via faraday
  shell: |
    ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no root@{{ current_ue }} \
    "mkdir -p {{ log_dir }} && ping {{ target_server }} -I {{ ue_ip }} -4 -n -O -D -w {{ duration }} {{ extra_args }} > {{ log_dir }}/ping.log && sleep {{ sleep }}"
  ignore_errors: "{{ ignore_task_errors | default(false) }}"
  when: ue_ip is defined and ue_ip != ""
  loop: "{{ ping_scenarios }}"
  loop_control:
    loop_var: scenario
  vars:
    packet_size: "{{ scenario.packet_size }}"
    extra_args: "{{ scenario.extra_args }}"
    log_dir: "/tmp/ping_logs/protocol=ICMP/ue_count=1/packet_size={{ packet_size }}"